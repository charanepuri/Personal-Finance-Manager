<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Personal Finance Manager</title>

    <!-- SEO & Metadata -->
    <meta name="description" content="A personal finance manager to track income, expenses, budgets, and savings.">
    <meta name="keywords" content="finance, manager, budget, expense, income, tracking, savings, money">
    <meta name="author" content="Your Name">
    <meta name="generator" content="Gemini Code Assist">

    <!-- UI & Behavior -->
    <meta name="theme-color" content="#4F46E5">
    <meta name="color-scheme" content="light dark">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="refresh" content="1800">

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com;">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="icon" href="./logo.png" type="image/x-icon">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/budgets.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/toast.css">

</head>

<body>

<div class="app">

    <!-- ==========================
         Sidebar
    =========================== -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-wallet"></i>

            <span>Finance</span>

        </div>

        <nav>

            <a href="#" data-view="dashboard" class="active">

                <i class="fa-solid fa-house"></i>

                <span>Dashboard</span>

            </a>

            <a href="#" data-view="income">

                <i class="fa-solid fa-arrow-up"></i>

                <span>Income</span>

            </a>

            <a href="#" data-view="expense">

                <i class="fa-solid fa-arrow-down"></i>

                <span>Expense</span>

            </a>

            <a href="#" data-view="reports">

                <i class="fa-solid fa-chart-pie"></i>

                <span>Reports</span>

            </a>

            <a href="#" data-view="calendar">

                <i class="fa-solid fa-calendar"></i>

                <span>Calendar</span>

            </a>

            <a href="#" data-view="budgets">

                <i class="fa-solid fa-bullseye"></i>

                <span>Budgets</span>

            </a>

            <a href="#" data-view="wishlist">

                <i class="fa-solid fa-star"></i>

                <span>Wishlist</span>

            </a>

            <a href="#" data-view="settings">

                <i class="fa-solid fa-gear"></i>

                <span>Settings</span>

            </a>

        </nav>

    </aside>

    <!-- ==========================
         Main Content
    =========================== -->

    <main class="main">

        <!-- Header -->

        <header class="header">

            <div class="header-left">

                <h2 id="greeting">

                    Good Evening 👋

                </h2>

                <p id="today-date">

                </p>

            </div>

            <div class="header-right">

                <button
                    class="icon-btn"
                    id="reset-app"
                    title="Reset Data">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                </button>

                <button
                    class="icon-btn"
                    id="theme-toggle"
                    title="Toggle Theme">

                </button>

            </div>

        </header>

        <!-- Dynamic View -->

        <section id="page-content">

            <!--
                Dashboard
                Reports
                Calendar
                Budgets
                Settings

                Everything will be rendered here.
            -->

        </section>

    </main>

</div>

<!-- Floating Button -->

<button class="fab" id="openModal">

    <i class="fa-solid fa-plus"></i>

</button>

<!-- Modal -->

<div class="modal" id="transactionModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Add Transaction</h2>

            <button class="close-btn" id="closeModal">

                &times;

            </button>

        </div>

        <form id="transactionForm">

            <div class="form-group">

                <label>Transaction Type</label>

                <select id="type">

                    <option value="income">Income</option>

                    <option value="expense">Expense</option>

                </select>

            </div>

            <div class="form-group">

                <label>Amount</label>

                <input
                    type="number"
                    id="amount"
                    placeholder="Enter amount">

            </div>

            <div class="form-group">

                <label>Category</label>

                <select id="category"></select>

            </div>

            <div class="form-group">

                <label>Payment Method</label>

                <select id="payment"></select>

            </div>

            <div class="form-group" id="date-group">

                <label>Date</label>

                <input
                    type="date"
                    id="date">

            </div>

            <div class="form-group" id="notes-group">

                <label>Notes</label>

                <textarea
                    rows="4"
                    id="notes"></textarea>

            </div>

            <button class="save-btn">

                Save Transaction

            </button>

        </form>

    </div>

</div>

<!-- Confirmation Modal -->
<div class="modal" id="confirmationModal">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h2 id="confirmationTitle">Confirm Action</h2>
            <button class="close-btn" id="closeConfirmationModal">&times;</button>
        </div>
        <p id="confirmationMessage" class="confirmation-message">Are you sure?</p>
        <div class="confirmation-buttons">
            <button class="btn btn-outline" id="cancelConfirmBtn">Cancel</button>
            <button class="btn btn-danger" id="confirmBtn">Confirm</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/app.js"></script>

</body>

</html>
